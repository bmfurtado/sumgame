<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05060f">
<title>Sum Shuffle</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='%2322d3ee'/%3E%3Ctext x='32' y='42' font-size='30' font-weight='bold' text-anchor='middle' fill='%23051018' font-family='sans-serif'%3E8%3C/text%3E%3C/svg%3E">
<style>
  :root { --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px); }
  * { margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #05060f;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    position: fixed;
    width: 100%;
  }
  canvas { display: block; position: fixed; inset: 0; width: 100vw; height: 100vh; height: 100dvh; touch-action: none; }
  #err {
    display: none; position: fixed; inset: 0; color: #f87171; background: #05060f;
    font: 16px system-ui, sans-serif; padding: 40px 24px; text-align: center; z-index: 10;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="err">Couldn't load the physics engine.<br><br>Check your internet connection and reload.</div>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<script>
'use strict';
if (typeof Matter === 'undefined') {
  document.getElementById('err').style.display = 'block';
  throw new Error('Matter.js failed to load');
}

/* ============================================================
   SUM SHUFFLE — neon shuffleboard × 2048
   ============================================================ */

const { Engine, Bodies, Body, Composite, Events, Vector } = Matter;

// ---------- Tunables ----------
const START_TIME   = 90;      // seconds per round
const OBJ_TIME = { 4: 4, 8: 6, 16: 9, 32: 12, 64: 15, 128: 18, 256: 22, 512: 26 }; // seconds granted per completed target
const MERGE_SPEED  = 1.1;     // min relative speed for equal pucks to fuse
const FRICTION_AIR = 0.013;   // glide decay — lower = longer, punchier glides
const MIN_POWER    = 6, MAX_POWER = 16;
const MERGE_CARRY  = 1.6;     // follow-through: merged pucks keep boosted momentum so they can chain into the next puck
const REST_PUCK    = 0.62;    // puck bounciness
const REST_WALL    = 0.5;     // wall bounciness (Matter uses max of the pair, so wall kicks effectively use REST_PUCK)
const LAUNCH_DECAY = 0.5;     // each higher launch value is this much as likely as the one below it
const LAUNCH_COOLDOWN = 380;  // ms between shots
const AIM_MAX_TILT = 1.22;    // radians either side of straight up

const OBJ_POINTS = { 4: 40, 8: 100, 16: 240, 32: 600, 64: 1400, 128: 3200, 256: 7000, 512: 15000 };
const TIME_CAP = 150;          // banked time can never exceed this
const TIME_BONUS_DECAY = 0.93; // each completed target shrinks later time bonuses (floor 3s)
const MAX_PUCK = 512;          // merges beyond the biggest possible target detonate for points

// ---------- Power-ups ----------
const RUSH_CHANCE = 0.35;      // base chance a target rolls a rush bonus (never the first target)
const RUSH_CHANCE_RAMP = 0.025; // added per completed target, so offers keep pace as targets slow down
const RUSH_CHANCE_MAX = 0.6;
const RUSH_PITY = 2;           // a rush is guaranteed after this many rush-less targets in a row
const DEAL_FLOOR_DIV = 16;     // never deal below target/16 — skips regrinding the ladder's bottom
const RUSH_WINDOW = { 4: 10, 8: 14, 16: 18, 32: 24, 64: 30, 128: 36, 256: 42, 512: 50 }; // seconds to earn it
const RARE_WINDOW_SCALE = 0.7; // rare power-ups must be earned faster
const RUSH_WEIGHT = { common: 3, rare: 1 };
const POWERUPS = {
  rapid:  { label: 'RAPID FIRE', icon: '⚡', color: '#fb923c', duration: 6, cooldown: 120 },
  multi:  { label: 'MULTI SHOT', icon: '✦', color: '#4ade80', duration: 7, spread: 0.22 },
  blast:  { label: 'BLAST', icon: '💥', color: '#f87171', duration: 8, radius: 160, strength: 6.5 },
  bouncy: { label: 'SUPER BOUNCE', icon: '🏀', color: '#facc15', duration: 7, rest: 1.06 },
  magnet: { label: 'MAGNET', icon: '🧲', color: '#e879f9', duration: 8, radius: 180, strength: 5, rare: true },
  freeze: { label: 'TIME FREEZE', icon: '❄', color: '#7dd3fc', duration: 6, rare: true }
};
const PALETTE = ['#22d3ee','#a78bfa','#f472b6','#fb923c','#facc15','#4ade80','#f87171','#60a5fa','#2dd4bf','#e879f9','#fef08a','#f0abfc'];

const log2 = v => Math.round(Math.log2(v));
const puckColor = v => PALETTE[Math.min(log2(v), PALETTE.length - 1)];
// each doubling adds less radius than the last (asymptote 42), so late-game
// boards full of big pucks stay navigable instead of wall-to-wall circles
const puckRadius = v => 16 + 26 * (1 - Math.pow(0.86, log2(v)));
const clamp = (x, a, b) => Math.min(b, Math.max(a, x));
const lerp = (a, b, t) => a + (b - a) * t;
const rnd = (a, b) => a + Math.random() * (b - a);

// ---------- Canvas ----------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
let safeTop = 0, safeBottom = 0;
// Layout (recomputed on resize)
let hudH, playTop, playBottom, playLeft, playRight, launcherX, launcherY, launchLineY, chipY, chipH;

function readSafeArea() {
  const cs = getComputedStyle(document.documentElement);
  safeTop = parseFloat(cs.getPropertyValue('--sat')) || 0;
  safeBottom = parseFloat(cs.getPropertyValue('--sab')) || 0;
}

function resize() {
  readSafeArea();
  DPR = lowGfx ? 1 : Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  chipY = safeTop + 64;
  chipH = 52;
  hudH = chipY + chipH + 12;
  playTop = hudH;
  // extra bottom clearance keeps drag gestures away from the screen edge,
  // where iOS Reachability (swipe down on the bottom edge) would trigger
  playBottom = H - safeBottom - 30;
  playLeft = 8;
  playRight = W - 8;
  launcherX = W / 2;
  launcherY = playBottom - 58;
  launchLineY = launcherY - 80;
  rebuildWalls();
}
window.addEventListener('resize', resize);

// ---------- Graphics quality ----------
// Firefox on Android chokes on canvas shadow blur and per-frame gradients, so
// it defaults to the cheap renderer; the choice is persisted once toggled
const IS_FIREFOX_ANDROID = /Android/i.test(navigator.userAgent) && /Firefox\//i.test(navigator.userAgent);
let lowGfx = IS_FIREFOX_ANDROID;
try {
  const v = localStorage.getItem('sumshuffle_lowgfx');
  if (v !== null) lowGfx = v === '1';
} catch (e) {}

function setLowGfx(on) {
  lowGfx = on;
  try { localStorage.setItem('sumshuffle_lowgfx', on ? '1' : '0'); } catch (e) {}
  resize(); // re-applies the DPR cap
}

// neon glow is the single most expensive canvas feature on weak GPUs
function glow(color, blur) {
  if (lowGfx) return;
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
}

// ---------- Audio (all sounds synthesized) ----------
let AC = null, master = null, noiseBuf = null, lastHitSound = 0;
let soundOn = true;
try { soundOn = localStorage.getItem('sumshuffle_sound') !== '0'; } catch (e) {}

function setSound(on) {
  soundOn = on;
  try { localStorage.setItem('sumshuffle_sound', on ? '1' : '0'); } catch (e) {}
  if (master) master.gain.value = on ? 0.5 : 0;
}

function initAudio() {
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain();
    master.gain.value = soundOn ? 0.5 : 0;
    master.connect(AC.destination);
    const len = AC.sampleRate;
    noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  } catch (e) { AC = null; }
}

function tone(freq, type, dur, vol, slideTo, delay) {
  if (!AC) return;
  const t0 = AC.currentTime + (delay || 0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(master);
  o.start(t0); o.stop(t0 + dur + 0.05);
}

function noiseHit(dur, vol, freq, q, slideTo, delay) {
  if (!AC) return;
  const t0 = AC.currentTime + (delay || 0);
  const s = AC.createBufferSource(); s.buffer = noiseBuf; s.loop = true;
  const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = q || 1;
  f.frequency.setValueAtTime(freq, t0);
  if (slideTo) f.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  s.connect(f); f.connect(g); g.connect(master);
  s.start(t0); s.stop(t0 + dur + 0.05);
}

// haptics — no-op on iOS Safari (Vibration API unsupported there); taps work on Android
function buzz(ms) {
  try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {}
}

const MERGE_NOTES = [262, 330, 392, 523, 659, 784, 1047, 1319, 1568, 2093, 2637];
const sfx = {
  launch(p) { const k = clamp((p - MIN_POWER) / (MAX_POWER - MIN_POWER), 0, 1); noiseHit(0.22, 0.16 + 0.12 * k, 500 + 500 * k, 1.2, 1600 + 900 * k); },
  hit(i) {
    const now = performance.now();
    if (now - lastHitSound < 45) return;
    lastHitSound = now;
    const v = clamp(i, 0, 1);
    tone(85 + 40 * v, 'sine', 0.07, 0.22 * v);
    noiseHit(0.035, 0.14 * v, 2600, 2);
  },
  merge(v) {
    const n = Math.min(log2(v) - 1, MERGE_NOTES.length - 1);
    const f = MERGE_NOTES[Math.max(0, n)];
    tone(f, 'triangle', 0.3, 0.3);
    tone(f * 1.5, 'triangle', 0.25, 0.18, null, 0.03);
    noiseHit(0.06, 0.1, 3800, 3);
  },
  objective() { [523, 659, 784, 1047].forEach((f, i) => { tone(f, 'sine', 0.22, 0.24, null, i * 0.06); tone(f, 'triangle', 0.18, 0.1, null, i * 0.06); }); },
  powerup() { [392, 523, 659, 784, 1047].forEach((f, i) => tone(f, 'square', 0.14, 0.13, null, i * 0.05)); tone(1568, 'sine', 0.35, 0.16, 2093, 0.28); },
  powerdown() { tone(700, 'sawtooth', 0.18, 0.1, 350); tone(450, 'sawtooth', 0.22, 0.09, 220, 0.1); },
  rushMiss() { tone(330, 'sine', 0.16, 0.14, 294); tone(262, 'sine', 0.2, 0.12, 233, 0.12); },
  overload() { tone(120, 'sawtooth', 0.5, 0.28, 55); noiseHit(0.42, 0.28, 900, 1.2, 140); tone(1568, 'sine', 0.32, 0.18, 392, 0.05); },
  timeBonus() { tone(880, 'sine', 0.35, 0.24, 1760); tone(2093, 'sine', 0.15, 0.14, null, 0.12); tone(2637, 'sine', 0.18, 0.12, null, 0.2); },
  tick() { tone(1050, 'square', 0.035, 0.1); },
  warn30() { tone(440, 'sine', 0.14, 0.22); tone(330, 'sine', 0.18, 0.2, null, 0.14); },
  gameOver() { [392, 330, 262, 196].forEach((f, i) => tone(f, 'sawtooth', 0.28, 0.14, f * 0.94, i * 0.16)); },
  start() { tone(523, 'triangle', 0.15, 0.2); tone(784, 'triangle', 0.2, 0.2, null, 0.09); }
};

// ---------- Physics ----------
const engine = Engine.create();
engine.gravity.x = 0; engine.gravity.y = 0;
const world = engine.world;
let walls = [];

// collision categories: the launch line barrier is intangible to each puck
// until that puck's center crosses the line, then it turns solid for it
const CAT_PUCK = 0x0001, CAT_BARRIER = 0x0002;

function rebuildWalls() {
  for (const w of walls) Composite.remove(world, w);
  const T = 80; // thickness, centered outside the play edge
  const opts = { isStatic: true, restitution: REST_WALL, friction: 0.01, label: 'wall' };
  walls = [
    Bodies.rectangle((playLeft + playRight) / 2, playTop - T / 2, W + T * 2, T, opts),
    Bodies.rectangle((playLeft + playRight) / 2, playBottom + T / 2, W + T * 2, T, opts),
    Bodies.rectangle(playLeft - T / 2, H / 2, T, H * 2, opts),
    Bodies.rectangle(playRight + T / 2, H / 2, T, H * 2, opts),
    Bodies.rectangle((playLeft + playRight) / 2, launchLineY + 20, playRight - playLeft, 40, {
      isStatic: true, restitution: REST_WALL, friction: 0.01, label: 'launchline',
      collisionFilter: { category: CAT_BARRIER, mask: 0xFFFFFFFF }
    }),
  ];
  Composite.add(world, walls);
}

// ---------- Game state ----------
let state = 'menu';            // menu | play | paused | over
let mode = 'timed';            // timed | zen
let menuButtons = null;
let menuSoundRect = null, menuGfxRect = null, pauseRect = null, pausedButtons = null;
let score = 0, scoreShown = 0, best = 0;
let timeLeft = START_TIME;
let lastTickSecond = -1;
let warned30 = false;          // 30s warning fired (re-arms if bonuses push time back up)
let objective = null, nextObjective = null;   // {value, points, time, flash, rush}
let rushDrought = 0;           // targets rolled in a row without a rush offer (pity counter)
let powers = [];               // active power-ups, stackable: [{type, until (simTime ms)}], newest last
const hasPower = t => powers.some(p => p.type === t);
let pendingTargetCheck = 0;    // simTime deadline for the delayed fresh-target re-check
let objectivesCompleted = 0;
let pucks = [];                // {body, value, r, color, trail[]}
let currentValue = 1, nextValue = 2;
let lastLaunch = -1e9;
let overAt = 0, startedAt = 0;
let biggestPuck = 0;
let shake = { t: 0, mag: 0 };

try { best = +localStorage.getItem('sumshuffle_best') || 0; } catch (e) {}

// Effects
let particles = [], floaters = [], shockwaves = [];

// Aiming — two gestures share one drag: move up from the touch point to aim
// where the finger points ('point'), or drag down to pull back like a cue
// ('pull', shot fires opposite the drag). Mode locks once decided.
let aiming = false, aimId = -1, aimX = 0, aimY = 0;
let aimStartX = 0, aimStartY = 0, aimMode = null;

// ---------- Pucks ----------
function createPuck(x, y, value, vx, vy) {
  const r = puckRadius(value);
  // pucks born on the board (starters, merge results — possibly straddling
  // the line) are solid immediately; launched pucks start below and only
  // turn solid once they fully clear the line
  const crossed = y < launchLineY;
  const bornAt = simTime;
  const body = Bodies.circle(x, y, r, {
    frictionAir: FRICTION_AIR,
    restitution: hasPower('bouncy') ? POWERUPS.bouncy.rest : REST_PUCK,
    friction: 0.01,
    density: 0.0015,
    label: 'puck',
    collisionFilter: { category: CAT_PUCK, mask: crossed ? 0xFFFFFFFF : (0xFFFFFFFF ^ CAT_BARRIER) }
  });
  const p = { body, value, r, color: puckColor(value), trail: [], born: bornAt, crossed };
  body.plugin.puck = p;
  Body.setVelocity(body, { x: vx || 0, y: vy || 0 });
  Composite.add(world, body);
  pucks.push(p);
  if (value > biggestPuck) biggestPuck = value;
  return p;
}

function removePuck(p) {
  const i = pucks.indexOf(p);
  if (i >= 0) pucks.splice(i, 1);
  Composite.remove(world, p.body);
}

function randLaunchValue() {
  // launchable values go up to the biggest puck on the board, each doubling
  // half as likely as the one below it (small values always dominate), but
  // never below target/16 — late-game targets shouldn't be rebuilt from 1s
  const biggest = pucks.reduce((m, p) => Math.max(m, p.value), 0);
  const minExp = objective ? Math.max(0, log2(objective.value) - log2(DEAL_FLOOR_DIV)) : 0;
  const maxExp = Math.max(minExp, clamp(log2(Math.max(2, biggest)), 1, 8));
  let total = 0;
  const weights = [];
  for (let k = minExp; k <= maxExp; k++) { const w = Math.pow(LAUNCH_DECAY, k - minExp); weights.push(w); total += w; }
  let roll = Math.random() * total;
  for (let k = minExp; k <= maxExp; k++) { roll -= weights[k - minExp]; if (roll <= 0) return Math.pow(2, k); }
  return Math.pow(2, minExp);
}

// ---------- Objectives ----------
function objectivePool() {
  const c = objectivesCompleted;
  if (c < 2) return [4, 8];
  if (c < 5) return [8, 16];
  if (c < 8) return [16, 32];
  if (c < 12) return [16, 32, 64];
  if (c < 17) return [32, 64, 128];
  if (c < 22) return [64, 128, 256];
  return [128, 256, 512];
}

// time bonuses shrink as the run goes on, so banking time forever isn't
// possible; the preview in the target chip uses the same formula
function timeGrant(o) {
  return Math.max(3, Math.round(o.time * Math.pow(TIME_BONUS_DECAY, objectivesCompleted)));
}

function makeObjective(excludeValue) {
  const base = objectivePool();
  const biggest = pucks.reduce((m, p) => Math.max(m, p.value), 0);
  const cap = Math.max(8, biggest * 4); // never ask for something wildly beyond the board
  let pool = base.filter(v => v !== excludeValue && v <= cap);
  if (!pool.length) pool = [Math.min(...base)];
  const value = pool[Math.floor(Math.random() * pool.length)];
  // some targets roll a rush bonus: build them inside the window for a power-up
  let rush = null;
  if (objectivesCompleted >= 1 && !powers.length) {
    // offer rate ramps with progress (targets take longer to build late game,
    // so per-target chance rises to keep power-ups flowing per minute), and a
    // pity counter guarantees an offer after RUSH_PITY dry targets — but no
    // offers roll while a power-up is running (pity freezes too), so power-ups
    // can't chain into permanent uptime
    const chance = Math.min(RUSH_CHANCE_MAX, RUSH_CHANCE + RUSH_CHANCE_RAMP * objectivesCompleted);
    if (rushDrought >= RUSH_PITY || Math.random() < chance) {
      const type = rollRushType();
      const scale = POWERUPS[type].rare ? RARE_WINDOW_SCALE : 1;
      rush = { type, window: Math.round((RUSH_WINDOW[value] || 30) * scale), deadline: 0, missed: false };
      rushDrought = 0;
    } else {
      rushDrought++;
    }
  }
  return { value, points: OBJ_POINTS[value] || value * 25, time: OBJ_TIME[value] || 25, flash: 0, rush };
}

// the rush window starts when the target becomes the active one, not when it
// was rolled — nextObjective sits on deck for an unknown amount of time
function activateObjective(o) {
  if (o.rush) o.rush.deadline = simTime + o.rush.window * 1000;
}

// weighted roll: commons outnumber rares 3:1; freeze is meaningless
// without a timer, so zen never rolls it
function rollRushType() {
  const pool = [];
  for (const t of Object.keys(POWERUPS)) {
    if (t === 'freeze' && mode !== 'timed') continue;
    const w = POWERUPS[t].rare ? RUSH_WEIGHT.rare : RUSH_WEIGHT.common;
    for (let i = 0; i < w; i++) pool.push(t);
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

// one-time radial kick from (cx,cy): sign -1 pulls pucks in, +1 shoves them out
function radialImpulse(cx, cy, radius, strength, sign) {
  for (const p of pucks) {
    if (!p.crossed) continue; // the launch zone is out of reach
    const dx = p.body.position.x - cx, dy = p.body.position.y - cy;
    const d = Math.hypot(dx, dy);
    if (d < 1 || d > radius) continue;
    const s = strength * (1 - d / radius) * sign;
    Body.setVelocity(p.body, { x: p.body.velocity.x + (dx / d) * s, y: p.body.velocity.y + (dy / d) * s });
  }
}

function setPucksRestitution(rest) {
  for (const p of pucks) p.body.restitution = rest;
}

function activatePowerup(type, x, y) {
  const def = POWERUPS[type];
  const existing = powers.find(p => p.type === type);
  if (existing) {
    // re-earning an active power-up restarts its clock (and bumps it to newest)
    existing.until = simTime + def.duration * 1000;
    powers.splice(powers.indexOf(existing), 1);
    powers.push(existing);
    floaters.push({ x: W / 2, y: lerp(playTop, playBottom, 0.5), text: `${def.icon} ${def.label} EXTENDED!`, color: def.color, size: 22, life: 1.2, vy: -0.5 });
  } else {
    powers.push({ type, until: simTime + def.duration * 1000 });
    if (type === 'bouncy') setPucksRestitution(def.rest);
    floaters.push({ x: W / 2, y: lerp(playTop, playBottom, 0.5), text: `${def.icon} ${def.label}!`, color: def.color, size: 26, life: 1.3, vy: -0.5 });
  }
  burst(x, y, def.color, 30, 4);
  shake.t = Math.max(shake.t, 0.2); shake.mag = Math.max(shake.mag, 4);
  buzz(40);
  setTimeout(() => sfx.powerup(), 180); // let the target fanfare land first
}

function completeObjective(puck) {
  const o = objective;
  const grant = timeGrant(o); // before the completion counter ticks, matching the chip preview
  const { x, y } = puck.body.position;
  removePuck(puck);
  if (mode === 'timed') score += o.points;
  objectivesCompleted++;
  burst(x, y, puckColor(o.value), 42, 5);
  shockwaves.push({ x, y, r: puck.r, maxR: 130, life: 1, color: puckColor(o.value) });
  floaters.push({ x, y: y - 10, text: mode === 'timed' ? `TARGET! +${o.points}` : 'TARGET!', color: '#fef08a', size: 22, life: 1, vy: -0.7 });
  shake.t = 0.25; shake.mag = 5;
  sfx.objective();
  if (o.rush && !o.rush.missed && simTime <= o.rush.deadline) activatePowerup(o.rush.type, x, y);
  if (mode === 'timed') {
    timeLeft = Math.min(timeLeft + grant, TIME_CAP);
    floaters.push({ x, y: y + 22, text: `+${grant}s`, color: '#facc15', size: 17, life: 1, vy: -0.5 });
    floaters.push({ x: W - 70, y: safeTop + 44, text: `+${grant}s`, color: '#facc15', size: 24, life: 1, vy: -0.4 });
    setTimeout(() => sfx.timeBonus(), 150);
  }
  objective = nextObjective;
  objective.flash = 1;
  activateObjective(objective);
  nextObjective = makeObjective(objective.value);
  // a puck built earlier may already match the fresh target — cash it in after
  // a beat, on the sim clock so the delay scales with any slowdown
  pendingTargetCheck = simTime + 450;
}

// ---------- Merging ----------
const mergeQueue = [];
const mergedIds = new Set();

function tryMerge(a, b) {
  const pa = a.plugin && a.plugin.puck, pb = b.plugin && b.plugin.puck;
  if (!pa || !pb || pa.value !== pb.value) return;
  if (mergedIds.has(a.id) || mergedIds.has(b.id)) return;
  // merges only happen on the board proper — the launch zone is inert
  if (a.position.y >= launchLineY || b.position.y >= launchLineY) return;
  const rel = Vector.magnitude(Vector.sub(a.velocity, b.velocity));
  if (rel >= MERGE_SPEED) {
    mergedIds.add(a.id); mergedIds.add(b.id);
    mergeQueue.push([pa, pb]);
  }
}

Events.on(engine, 'collisionStart', ev => {
  for (const pair of ev.pairs) {
    const a = pair.bodyA, b = pair.bodyB;
    const pa = a.plugin && a.plugin.puck, pb = b.plugin && b.plugin.puck;
    const rel = Vector.magnitude(Vector.sub(a.velocity, b.velocity));
    if (pa && pb) { if (rel > 0.8) sfx.hit(rel / 9); }
    else if (pa || pb) { if (rel > 1.2) sfx.hit(rel / 14); }
    tryMerge(a, b);
  }
});

// pucks already resting in contact never re-fire collisionStart, so an
// indirect shove that presses them together is checked here instead
Events.on(engine, 'collisionActive', ev => {
  for (const pair of ev.pairs) tryMerge(pair.bodyA, pair.bodyB);
});


function processMerges() {
  while (mergeQueue.length) {
    const [pa, pb] = mergeQueue.shift();
    if (!pucks.includes(pa) || !pucks.includes(pb)) continue;
    const A = pa.body, B = pb.body;
    const x = (A.position.x + B.position.x) / 2;
    const y = (A.position.y + B.position.y) / 2;
    const vx = (A.velocity.x + B.velocity.x) / 2 * MERGE_CARRY;
    const vy = (A.velocity.y + B.velocity.y) / 2 * MERGE_CARRY;
    const nv = pa.value * 2;
    removePuck(pa); removePuck(pb);
    if (nv > MAX_PUCK) {
      // beyond the biggest possible target the fusion can't hold — it
      // detonates for points and blows the neighborhood open
      const pts = nv * 2;
      if (mode === 'timed') score += pts;
      radialImpulse(x, y, 200, 7, 1);
      burst(x, y, '#fef08a', 46, 5.5);
      shockwaves.push({ x, y, r: 24, maxR: 220, life: 1, color: '#fef08a' });
      floaters.push({ x, y: y - 12, text: mode === 'timed' ? `OVERLOAD! +${pts}` : 'OVERLOAD!', color: '#fef08a', size: 22, life: 1.2, vy: -0.6 });
      shake.t = Math.max(shake.t, 0.3); shake.mag = Math.max(shake.mag, 6);
      buzz(50);
      sfx.overload();
      continue;
    }
    const np = createPuck(x, y, nv, vx, vy);
    burst(x, y, np.color, 18, 3.2);
    if (mode === 'timed') {
      score += nv;
      floaters.push({ x, y: y - np.r - 6, text: '+' + nv, color: np.color, size: 17, life: 1, vy: -0.6 });
    }
    shake.t = Math.max(shake.t, 0.08); shake.mag = Math.max(shake.mag, 2);
    sfx.merge(nv);
    if (hasPower('magnet')) {
      radialImpulse(x, y, POWERUPS.magnet.radius, POWERUPS.magnet.strength, -1);
      // collapsing ring sells the pull
      shockwaves.push({ x, y, r: POWERUPS.magnet.radius * 0.7, maxR: 10, life: 1, color: POWERUPS.magnet.color });
    }
    if (hasPower('blast')) {
      radialImpulse(x, y, POWERUPS.blast.radius, POWERUPS.blast.strength, 1);
      shockwaves.push({ x, y, r: np.r, maxR: POWERUPS.blast.radius, life: 1, color: POWERUPS.blast.color });
      burst(x, y, POWERUPS.blast.color, 14, 4.5);
      shake.t = Math.max(shake.t, 0.15); shake.mag = Math.max(shake.mag, 3.5);
    }
    if (objective && np.value === objective.value) completeObjective(np);
  }
  mergedIds.clear();
}

// ---------- Effects ----------
function burst(x, y, color, n, speed) {
  if (lowGfx) n = Math.ceil(n * 0.4);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = rnd(0.3, 1) * speed;
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 1, decay: rnd(1.2, 2.6), size: rnd(1.5, 4), color
    });
  }
}

function updateEffects(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.y += f.vy; f.life -= dt * 0.9;
    if (f.life <= 0) floaters.splice(i, 1);
  }
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const s = shockwaves[i];
    s.life -= dt * 2.2;
    if (s.life <= 0) shockwaves.splice(i, 1);
  }
  if (objective && objective.flash > 0) objective.flash = Math.max(0, objective.flash - dt * 1.5);
  if (shake.t > 0) shake.t -= dt;
}

// ---------- Round control ----------
function startGame() {
  for (const p of [...pucks]) removePuck(p);
  particles = []; floaters = []; shockwaves = []; mergeQueue.length = 0;
  score = 0; scoreShown = 0; timeLeft = START_TIME; lastTickSecond = -1; warned30 = false;
  objectivesCompleted = 0; biggestPuck = 0;
  pendingTargetCheck = 0;
  powers = [];
  rushDrought = 0;
  objective = makeObjective();
  activateObjective(objective);
  nextObjective = makeObjective(objective.value);
  currentValue = randLaunchValue(); nextValue = randLaunchValue();
  lastLaunch = -1e9;
  aiming = false;
  startedAt = performance.now();
  // a few starter pucks so the board is alive from shot one
  const midY = lerp(playTop, playBottom, 0.38);
  const vals = [1, 2, 2];
  for (let i = 0; i < 3; i++) {
    createPuck(lerp(playLeft + 50, playRight - 50, (i + 0.5) / 3) + rnd(-15, 15), midY + rnd(-50, 50), vals[i]);
  }
  state = 'play';
  sfx.start();
}

function endGame() {
  state = 'over';
  overAt = performance.now();
  aiming = false;
  if (score > best) {
    best = score;
    try { localStorage.setItem('sumshuffle_best', best); } catch (e) {}
  }
  sfx.gameOver();
}

// ---------- Input ----------
function canLaunch() {
  const cd = hasPower('rapid') ? POWERUPS.rapid.cooldown : LAUNCH_COOLDOWN;
  return state === 'play' && simTime - lastLaunch > cd;
}

function aimVector() {
  let dx, dy;
  if (aimMode === 'pull') { dx = aimStartX - aimX; dy = aimStartY - aimY; }
  else { dx = aimX - launcherX; dy = aimY - launcherY; }
  const d = Math.hypot(dx, dy);
  if (d < 4) return null;
  let ang = Math.atan2(dy, dx);
  // clamp around straight up (-PI/2)
  let off = ang + Math.PI / 2;
  while (off > Math.PI) off -= Math.PI * 2;
  while (off < -Math.PI) off += Math.PI * 2;
  off = clamp(off, -AIM_MAX_TILT, AIM_MAX_TILT);
  ang = -Math.PI / 2 + off;
  // full power is reached when the drag spans from the launcher to about
  // mid-screen; pull-back saturates sooner so downward drags stay short and
  // never reach the bottom screen edge (iOS Reachability zone)
  const maxDrag = aimMode === 'pull' ? 65 : Math.max(120, launcherY - H * 0.5);
  const power = d < 30 ? 0 : lerp(MIN_POWER, MAX_POWER, clamp((d - 30) / maxDrag, 0, 1));
  return { dx: Math.cos(ang), dy: Math.sin(ang), power };
}

function launch() {
  const v = aimVector();
  if (!v || v.power <= 0) return;
  const multi = hasPower('multi');
  const angles = multi ? [-POWERUPS.multi.spread, 0, POWERUPS.multi.spread] : [0];
  const r = puckRadius(currentValue);
  for (const a of angles) {
    const dx = v.dx * Math.cos(a) - v.dy * Math.sin(a);
    const dy = v.dx * Math.sin(a) + v.dy * Math.cos(a);
    // side pucks spawn shifted along the aim's perpendicular so the trio
    // doesn't start overlapping and get shoved apart by the solver
    const off = Math.sign(a) * (r * 2 + 6);
    const px = clamp(launcherX - v.dy * off, playLeft + r, playRight - r);
    const py = launcherY + v.dx * off;
    const p = createPuck(px, py, currentValue, dx * v.power, dy * v.power);
    burst(px, py + 6, p.color, multi ? 5 : 8, 2);
  }
  sfx.launch(v.power);
  lastLaunch = simTime;
  currentValue = nextValue;
  nextValue = randLaunchValue();
}

const inRect = (px, py, r) => r && px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;

function pauseGame() {
  if (state === 'play') {
    state = 'paused';
    aiming = false;
  }
}
// auto-pause when the app goes to the background mid-round
document.addEventListener('visibilitychange', () => { if (document.hidden) pauseGame(); });

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  initAudio();
  if (state === 'menu') {
    if (inRect(e.clientX, e.clientY, menuButtons && menuButtons.timed)) { mode = 'timed'; startGame(); }
    else if (inRect(e.clientX, e.clientY, menuButtons && menuButtons.zen)) { mode = 'zen'; startGame(); }
    else if (inRect(e.clientX, e.clientY, menuSoundRect)) { setSound(!soundOn); if (soundOn) sfx.tick(); }
    else if (inRect(e.clientX, e.clientY, menuGfxRect)) { setLowGfx(!lowGfx); if (soundOn) sfx.tick(); }
    return;
  }
  if (state === 'paused') {
    const b = pausedButtons;
    if (inRect(e.clientX, e.clientY, b && b.sound)) { setSound(!soundOn); if (soundOn) sfx.tick(); }
    else if (inRect(e.clientX, e.clientY, b && b.gfx)) { setLowGfx(!lowGfx); if (soundOn) sfx.tick(); }
    else if (inRect(e.clientX, e.clientY, b && b.exit)) state = 'menu';
    else state = 'play'; // resume button — or any tap outside the buttons
    return;
  }
  if (state === 'over') { if (performance.now() - overAt > 700) state = 'menu'; return; }
  if (inRect(e.clientX, e.clientY, pauseRect)) { pauseGame(); return; }
  if (!aiming && canLaunch()) {
    aiming = true; aimId = e.pointerId;
    aimX = aimStartX = e.clientX; aimY = aimStartY = e.clientY;
    aimMode = null;
  }
});
canvas.addEventListener('pointermove', e => {
  if (aiming && e.pointerId === aimId) {
    aimX = e.clientX; aimY = e.clientY;
    if (!aimMode && Math.hypot(aimX - aimStartX, aimY - aimStartY) > 18) {
      // pull-back only arms for drags starting in (or just above) the launch
      // zone; drags starting further up the board always point-aim
      const canPull = aimStartY > launchLineY - 30;
      aimMode = canPull && aimY > aimStartY ? 'pull' : 'point';
    }
  }
});
function endAim(e, fire) {
  if (aiming && e.pointerId === aimId) {
    aiming = false;
    if (fire && state === 'play') launch();
  }
}
canvas.addEventListener('pointerup', e => endAim(e, true));
canvas.addEventListener('pointercancel', e => endAim(e, false));
// block iOS double-tap zoom / long-press
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault());

// ---------- Main loop ----------
let lastT = performance.now(), acc = 0;
let simTime = 0; // simulated clock, advances with physics steps
const STEP = 1000 / 60;
const MAX_STEPS = 6; // catch-up budget per frame before conceding slow-motion

// per-physics-step puck maintenance (escape cleanup, line crossing, bad launches)
function stepPucks() {
  for (let i = pucks.length - 1; i >= 0; i--) {
    const p = pucks[i];
    const b = p.body;
    if (b.position.x < -80 || b.position.x > W + 80 || b.position.y < -80 || b.position.y > H + 80) { removePuck(p); continue; }
    if (!p.crossed) {
      if (b.position.y < launchLineY - p.r) {
        // fully cleared the launch line — the barrier is now solid for this
        // puck, with zero overlap to resolve (no phantom push)
        p.crossed = true;
        b.collisionFilter.mask = 0xFFFFFFFF;
        // a launched puck that already IS the target counts once it's on the board
        if (objective && p.value === objective.value) completeObjective(p);
      } else if (simTime - p.born > 800 && b.velocity.y > -1) {
        // stalled without fully clearing the line — a bad launch; clear it
        burst(b.position.x, b.position.y, p.color, 10, 1.6);
        floaters.push({ x: b.position.x, y: b.position.y, text: 'SHORT', color: 'rgba(150,160,200,0.9)', size: 13, life: 0.8, vy: -0.5 });
        removePuck(p);
      }
    }
  }
}

function stepPhysics() {
  Engine.update(engine, STEP);
  simTime += STEP;
  processMerges();
  stepPucks();
  if (pendingTargetCheck && simTime >= pendingTargetCheck) {
    pendingTargetCheck = 0;
    if (state === 'play' && objective) {
      const hit = pucks.find(p => p.value === objective.value);
      if (hit) completeObjective(hit);
    }
  }
  for (let i = powers.length - 1; i >= 0; i--) {
    if (simTime >= powers[i].until) {
      const def = POWERUPS[powers[i].type];
      if (powers[i].type === 'bouncy') setPucksRestitution(REST_PUCK);
      powers.splice(i, 1);
      floaters.push({ x: launcherX, y: launcherY - 60 - i * 16, text: def.icon + ' OVER', color: 'rgba(150,160,200,0.9)', size: 14, life: 0.9, vy: -0.5 });
      sfx.powerdown();
    }
  }
  if (objective && objective.rush && !objective.rush.missed && objective.rush.deadline && simTime > objective.rush.deadline) {
    // the window lapsed — the target stays, only the power-up bonus is gone
    objective.rush.missed = true;
    floaters.push({ x: W / 2, y: chipY + chipH + 26, text: 'RUSH MISSED', color: 'rgba(150,160,200,0.9)', size: 15, life: 1, vy: -0.4 });
    sfx.rushMiss();
  }
}

function frame(now) {
  requestAnimationFrame(frame);
  let dtMs = Math.min(now - lastT, 100); // clamp: pauses in background
  lastT = now;
  const dt = dtMs / 1000;

  if (state === 'play') {
    acc += dtMs;
    let steps = 0;
    while (acc >= STEP && steps < MAX_STEPS) {
      stepPhysics();
      acc -= STEP; steps++;
    }
    if (steps === MAX_STEPS) acc = 0;

    // machine-gun: while rapid fire is active, holding an aim sprays pucks
    if (hasPower('rapid') && aiming && canLaunch()) launch();

    // trails (visual only)
    if (!lowGfx) {
      for (const p of pucks) {
        p.trail.push({ x: p.body.position.x, y: p.body.position.y });
        if (p.trail.length > 8) p.trail.shift();
      }
    }

    if (mode === 'timed') {
      const prevTime = timeLeft;
      // drain by simulated time, not wall clock — if physics falls behind on a
      // slow device the whole game slows in lockstep instead of the timer
      // drifting apart from puck movement and the launch cooldown
      if (!hasPower('freeze')) timeLeft -= steps * STEP / 1000;
      if (warned30 && timeLeft > 31) warned30 = false; // a bonus lifted us out of the danger zone
      if (!warned30 && prevTime > 30 && timeLeft <= 30) {
        warned30 = true;
        buzz(30);
        sfx.warn30();
        floaters.push({ x: W - 70, y: safeTop + 44, text: '30s!', color: '#facc15', size: 20, life: 1.2, vy: -0.35 });
      }
      const s = Math.ceil(timeLeft);
      if (timeLeft <= 10 && s !== lastTickSecond && timeLeft > 0) {
        lastTickSecond = s;
        sfx.tick();
        if (s <= 5) buzz(60);
      }
      if (timeLeft <= 0) { timeLeft = 0; endGame(); }
    }
  }

  scoreShown = Math.abs(score - scoreShown) < 1 ? score : lerp(scoreShown, score, 1 - Math.pow(0.001, dt));
  updateEffects(dt);
  render(now);
}

// ---------- Rendering ----------
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawBackground(now) {
  if (lowGfx) {
    ctx.fillStyle = '#070917';
    ctx.fillRect(0, 0, W, H);
    return;
  }
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0a0d21');
  g.addColorStop(0.55, '#070917');
  g.addColorStop(1, '#0c0716');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // dot grid
  ctx.fillStyle = 'rgba(120,140,255,0.05)';
  for (let y = playTop + 20; y < playBottom; y += 44) {
    for (let x = playLeft + 22; x < playRight; x += 44) {
      ctx.fillRect(x, y, 2, 2);
    }
  }
}

function drawBoardFrame() {
  ctx.save();
  // super bounce: the walls themselves are the power-up, so they light up
  if (state === 'play' && hasPower('bouncy')) {
    ctx.strokeStyle = POWERUPS.bouncy.color;
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(performance.now() / 130);
    glow(POWERUPS.bouncy.color, 16);
  } else {
    ctx.strokeStyle = 'rgba(99,102,241,0.55)';
    glow('#6366f1', 14);
  }
  ctx.lineWidth = 2;
  roundRect(playLeft, playTop, playRight - playLeft, playBottom - playTop, 14);
  ctx.stroke();
  ctx.restore();
  // launch line (one-way barrier)
  ctx.save();
  ctx.setLineDash([7, 9]);
  ctx.strokeStyle = 'rgba(34,211,238,0.45)';
  glow('#22d3ee', 6);
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(playLeft + 14, launchLineY);
  ctx.lineTo(playRight - 14, launchLineY);
  ctx.stroke();
  ctx.restore();
}

function drawTargetWatermark() {
  if (state !== 'play' || !objective) return;
  const v = objective.value;
  const cx = (playLeft + playRight) / 2;
  const cy = lerp(playTop, playBottom, 0.33);
  const size = Math.min(W * 0.42, 170);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = puckColor(v);
  ctx.globalAlpha = 0.09;
  ctx.font = `800 ${size}px system-ui, sans-serif`;
  ctx.fillText(v, cx, cy);
  ctx.globalAlpha = 0.14;
  ctx.font = '700 19px system-ui, sans-serif';
  ctx.fillText(`${v / 2} + ${v / 2}`, cx, cy + size * 0.62);
  const rush = objective.rush;
  if (rush && !rush.missed && rush.deadline) {
    const left = Math.max(0, (rush.deadline - simTime) / 1000);
    const rdef = POWERUPS[rush.type];
    ctx.fillStyle = rdef.color;
    ctx.globalAlpha = 0.2 + 0.08 * Math.sin(performance.now() / 200);
    ctx.font = '800 17px system-ui, sans-serif';
    ctx.fillText(`${rdef.rare ? '★ ' : ''}${rdef.icon} ${rdef.label} · ${Math.ceil(left)}s`, cx, cy + size * 0.62 + 32);
  }
  ctx.restore();
}

function drawPuckAt(x, y, r, value, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha == null ? 1 : alpha;
  if (lowGfx) {
    ctx.fillStyle = color;
  } else {
    glow(color, 18);
    const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.35, r * 0.15, x, y, r);
    g.addColorStop(0, color);
    g.addColorStop(0.75, color);
    g.addColorStop(1, 'rgba(5,6,15,0.9)');
    ctx.fillStyle = g;
  }
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.arc(x, y, r - 1.2, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#0b0e1c';
  ctx.font = `800 ${Math.max(12, r * 0.85)}px system-ui, -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(value, x, y + r * 0.05);
  ctx.restore();
}

function drawPucks() {
  // trails
  if (!lowGfx) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of pucks) {
      const b = p.body;
      const sp = Math.hypot(b.velocity.x, b.velocity.y);
      if (sp < 1.4 || p.trail.length < 2) continue;
      for (let i = 0; i < p.trail.length - 1; i++) {
        const t = i / p.trail.length;
        ctx.globalAlpha = t * 0.16 * clamp(sp / 8, 0, 1);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.trail[i].x, p.trail[i].y, p.r * (0.4 + 0.5 * t), 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }
  for (const p of pucks) drawPuckAt(p.body.position.x, p.body.position.y, p.r, p.value, p.color);
  // pucks one merge away from the target pulse in its color
  if (state === 'play' && objective) {
    const half = objective.value / 2;
    const tc = puckColor(objective.value);
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 260);
    ctx.save();
    ctx.strokeStyle = tc;
    for (const p of pucks) {
      if (p.value !== half) continue;
      ctx.globalAlpha = 0.35 + 0.4 * pulse;
      glow(tc, 10);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.body.position.x, p.body.position.y, p.r + 5, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawPowerupBanner(now) {
  if (!powers.length) return;
  const bw = 190, bh = 32;
  // newest sits closest to the launch line, older ones stack up over the board
  for (let i = 0; i < powers.length; i++) {
    const pu = powers[powers.length - 1 - i];
    const def = POWERUPS[pu.type];
    const left = Math.max(0, pu.until - simTime);
    const frac = clamp(left / (def.duration * 1000), 0, 1);
    const bx = W / 2 - bw / 2, by = launchLineY + 10 - i * (bh + 6);
    ctx.save();
    const ending = left < 2000;
    ctx.globalAlpha = ending ? 0.55 + 0.45 * Math.sin(now / 80) : 1;
    if (aiming) ctx.globalAlpha *= 0.35; // stay out of the way of the aim guide
    ctx.fillStyle = 'rgba(16,20,44,0.85)';
    roundRect(bx, by, bw, bh, 10); ctx.fill();
    ctx.strokeStyle = def.color;
    glow(def.color, 10);
    ctx.lineWidth = 1.6;
    roundRect(bx, by, bw, bh, 10); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = def.color;
    ctx.font = '800 13px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${def.icon} ${def.label} ${(left / 1000).toFixed(1)}s`, W / 2, by + 12);
    ctx.globalAlpha *= 0.9;
    roundRect(bx + 8, by + bh - 8, Math.max(3, (bw - 16) * frac), 3, 1.5); ctx.fill();
    ctx.restore();
  }
}

function drawLauncher(now) {
  const ready = canLaunch();
  const pulse = 1 + 0.04 * Math.sin(now / 260);
  const r = puckRadius(currentValue);
  const puColor = powers.length ? POWERUPS[powers[powers.length - 1].type].color : null;
  // pad ring
  ctx.save();
  ctx.strokeStyle = ready ? (puColor || 'rgba(34,211,238,0.5)') : 'rgba(120,130,160,0.25)';
  if (puColor && ready) { ctx.globalAlpha = 0.7 + 0.3 * Math.sin(now / 120); glow(puColor, 10); }
  ctx.setLineDash([4, 6]);
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(launcherX, launcherY, (r + 10) * pulse, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
  drawPuckAt(launcherX, launcherY, r, currentValue, puckColor(currentValue), ready ? 1 : 0.45);
  // next preview
  const nr = 13;
  const nx = playRight - 34, ny = launcherY;
  ctx.save();
  ctx.fillStyle = 'rgba(150,160,200,0.55)';
  ctx.font = '600 10px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT', nx, ny - nr - 8);
  ctx.restore();
  drawPuckAt(nx, ny, nr, nextValue, puckColor(nextValue), 0.75);
  // hint early in round
  if (state === 'play' && pucks.length <= 4 && performance.now() - startedAt < 6000 && !aiming) {
    ctx.save();
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(now / 300);
    ctx.fillStyle = '#8b95c9';
    ctx.font = '600 13px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('drag to aim · pull back from the pad for a cue shot', W / 2, launcherY - 84);
    ctx.restore();
  }
}

function drawAimGuide() {
  if (!aiming || state !== 'play') return;
  const v = aimVector();
  if (!v || v.power <= 0) return;
  const r = puckRadius(currentValue);
  const total = lerp(130, 470, (v.power - MIN_POWER) / (MAX_POWER - MIN_POWER));
  // cast with one wall reflection
  let px = launcherX, py = launcherY, dx = v.dx, dy = v.dy, remain = total;
  const minX = playLeft + r, maxX = playRight - r, minY = playTop + r;
  const segs = [];
  for (let k = 0; k < 2 && remain > 1; k++) {
    let t = remain;
    let hitWall = null;
    if (dx > 1e-6) { const tx = (maxX - px) / dx; if (tx < t) { t = tx; hitWall = 'x'; } }
    if (dx < -1e-6) { const tx = (minX - px) / dx; if (tx < t) { t = tx; hitWall = 'x'; } }
    if (dy < -1e-6) { const ty = (minY - py) / dy; if (ty < t) { t = ty; hitWall = 'y'; } }
    segs.push({ x1: px, y1: py, x2: px + dx * t, y2: py + dy * t });
    px += dx * t; py += dy * t; remain -= t;
    if (!hitWall) break;
    // mirror the wall-normal component scaled by restitution, like the engine
    // does (Matter uses the max restitution of the pair), so banked segments
    // come off the wall steeper and shorter than a perfect mirror
    const rest = Math.max(REST_PUCK, REST_WALL);
    if (hitWall === 'x') dx = -dx * rest;
    else dy = -dy * rest;
    const sp = Math.hypot(dx, dy);
    remain *= sp;
    dx /= sp; dy /= sp;
  }
  ctx.save();
  const color = puckColor(currentValue);
  glow(color, 8);
  // cue-stick tail behind the launcher, length ∝ power
  const frac = (v.power - MIN_POWER) / (MAX_POWER - MIN_POWER);
  const r0 = puckRadius(currentValue) + 6;
  const tail = lerp(14, 40, frac);
  ctx.globalAlpha = 0.55;
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(launcherX - v.dx * r0, launcherY - v.dy * r0);
  ctx.lineTo(launcherX - v.dx * (r0 + tail), launcherY - v.dy * (r0 + tail));
  ctx.stroke();
  let drawn = 0;
  for (let si = 0; si < segs.length; si++) {
    const s = segs[si];
    const len = Math.hypot(s.x2 - s.x1, s.y2 - s.y1);
    const n = Math.floor(len / 16);
    for (let i = 1; i <= n; i++) {
      const t = i / n;
      const fade = 1 - (drawn + len * t) / (total * 1.15);
      ctx.globalAlpha = clamp(fade, 0.08, 0.9) * (si === 0 ? 1 : 0.55);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(lerp(s.x1, s.x2, t), lerp(s.y1, s.y2, t), 3.2, 0, Math.PI * 2);
      ctx.fill();
    }
    drawn += len;
  }
  // multi shot: hint the two extra spread rays
  if (hasPower('multi')) {
    for (const sgn of [-1, 1]) {
      const a = sgn * POWERUPS.multi.spread;
      const rdx = v.dx * Math.cos(a) - v.dy * Math.sin(a);
      const rdy = v.dx * Math.sin(a) + v.dy * Math.cos(a);
      for (let i = 1; i <= 9; i++) {
        const d0 = r + 8 + i * 16;
        ctx.globalAlpha = clamp(0.55 - i * 0.05, 0.1, 0.55);
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(launcherX + rdx * d0, launcherY + rdy * d0, 2.4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  // arrowhead at end of first segment
  const s0 = segs[0];
  const ang = Math.atan2(s0.y2 - s0.y1, s0.x2 - s0.x1);
  ctx.globalAlpha = 0.9;
  ctx.translate(s0.x2, s0.y2);
  ctx.rotate(ang);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(10, 0); ctx.lineTo(-5, -7); ctx.lineTo(-5, 7);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function fmtTime(t) {
  const s = Math.max(0, Math.ceil(t));
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function drawHUD(now) {
  const topY = safeTop + 12;
  ctx.save();
  ctx.textBaseline = 'alphabetic';
  // score (timed) / targets built (zen)
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(150,160,200,0.7)';
  ctx.font = '600 11px system-ui, sans-serif';
  ctx.fillText(mode === 'zen' ? 'TARGETS' : 'SCORE', 16, topY + 10);
  ctx.fillStyle = '#e8ecff';
  glow('#22d3ee', 10);
  ctx.font = '800 28px system-ui, sans-serif';
  ctx.fillText(mode === 'zen' ? objectivesCompleted : Math.round(scoreShown).toLocaleString(), 16, topY + 38);
  ctx.shadowBlur = 0;
  // best / mode label (center)
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(150,160,200,0.55)';
  ctx.font = '600 11px system-ui, sans-serif';
  ctx.fillText(mode === 'zen' ? 'ZEN MODE' : 'BEST ' + best.toLocaleString(), W / 2, topY + 10);
  // pause/menu button (under the center label, both modes)
  const pw2 = 46, ph2 = 26;
  pauseRect = { x: W / 2 - pw2 / 2, y: topY + 16, w: pw2, h: ph2 };
  ctx.save();
  ctx.fillStyle = 'rgba(16,20,44,0.85)';
  roundRect(pauseRect.x, pauseRect.y, pw2, ph2, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(139,149,201,0.45)';
  ctx.lineWidth = 1.2;
  roundRect(pauseRect.x, pauseRect.y, pw2, ph2, 8); ctx.stroke();
  ctx.fillStyle = '#8b95c9';
  const pcx = pauseRect.x + pw2 / 2, pcy = pauseRect.y + ph2 / 2;
  ctx.fillRect(pcx - 5, pcy - 5, 3.5, 10);
  ctx.fillRect(pcx + 1.5, pcy - 5, 3.5, 10);
  ctx.restore();
  if (mode === 'timed') {
    // time
    const frozen = state === 'play' && hasPower('freeze');
    const urgent = !frozen && timeLeft <= 10;
    const warn = timeLeft <= 30;
    const tColor = frozen ? '#7dd3fc' : urgent ? '#f87171' : warn ? '#facc15' : '#22d3ee';
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(150,160,200,0.7)';
    ctx.fillText(frozen ? '❄ FROZEN' : 'TIME', W - 16, topY + 10);
    ctx.fillStyle = tColor;
    glow(tColor, urgent ? 16 : 8);
    const tPulse = urgent && state === 'play' ? 1 + 0.06 * Math.sin(now / 90) : 1;
    ctx.font = `800 ${28 * tPulse}px system-ui, sans-serif`;
    ctx.fillText(fmtTime(timeLeft), W - 16, topY + 38);
    ctx.shadowBlur = 0;
    // timer bar
    const barY = topY + 46, barW = W - 32;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    roundRect(16, barY, barW, 5, 2.5); ctx.fill();
    const frac = clamp(timeLeft / START_TIME, 0, 1);
    if (frac > 0) {
      ctx.fillStyle = tColor;
      glow(tColor, 6);
      roundRect(16, barY, barW * frac, 5, 2.5); ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
  // target panel
  if (objective) {
    const o = objective;
    const x = 14, pw = W - 28, y = chipY;
    const accent = puckColor(o.value);
    ctx.save();
    ctx.textBaseline = 'middle';
    if (o.flash > 0) glow(accent, 26 * o.flash);
    ctx.fillStyle = 'rgba(16,20,44,0.85)';
    roundRect(x, y, pw, chipH, 14); ctx.fill();
    ctx.strokeStyle = accent;
    ctx.globalAlpha = 0.65 + 0.35 * (o.flash || 0);
    ctx.lineWidth = 1.6;
    roundRect(x, y, pw, chipH, 14); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    // label + value
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(150,160,200,0.7)';
    ctx.font = '700 10px system-ui, sans-serif';
    ctx.fillText('TARGET', x + 16, y + 13);
    ctx.fillStyle = accent;
    glow(accent, 12);
    ctx.font = `800 ${o.value >= 100 ? 25 : 30}px system-ui, sans-serif`;
    ctx.fillText(o.value, x + 16, y + chipH / 2 + 9);
    ctx.shadowBlur = 0;
    // reward
    const rushLive = o.rush && !o.rush.missed && o.rush.deadline;
    const rushLeft = rushLive ? Math.max(0, (o.rush.deadline - simTime) / 1000) : 0;
    const rdef = rushLive ? POWERUPS[o.rush.type] : null;
    const rushPulse = rushLive && rushLeft <= 3 ? 0.55 + 0.45 * Math.sin(now / 90) : 1;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(220,226,255,0.9)';
    ctx.font = '700 14px system-ui, sans-serif';
    if (mode === 'timed') {
      if (rushLive) {
        ctx.font = '700 12px system-ui, sans-serif';
        ctx.fillText('+' + o.points + ' pts', x + pw * 0.5, y + chipH * 0.24);
        ctx.fillStyle = '#facc15';
        ctx.font = '700 11px system-ui, sans-serif';
        ctx.fillText('⏱ +' + timeGrant(o) + 's', x + pw * 0.5, y + chipH * 0.5);
        ctx.fillStyle = rdef.color;
        ctx.globalAlpha = rushPulse;
        ctx.font = '800 11px system-ui, sans-serif';
        ctx.fillText(`${rdef.rare ? '★ ' : ''}${rdef.icon} ${rdef.label} ${Math.ceil(rushLeft)}s`, x + pw * 0.5, y + chipH * 0.78);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillText('+' + o.points + ' pts', x + pw * 0.5, y + chipH * 0.32);
        ctx.fillStyle = '#facc15';
        ctx.font = '700 13px system-ui, sans-serif';
        ctx.fillText('⏱ +' + timeGrant(o) + 's', x + pw * 0.5, y + chipH * 0.66);
      }
    } else if (rushLive) {
      ctx.fillStyle = rdef.color;
      ctx.globalAlpha = rushPulse;
      ctx.font = '800 13px system-ui, sans-serif';
      ctx.fillText(`${rdef.rare ? '★ ' : ''}${rdef.icon} ${rdef.label} · ${Math.ceil(rushLeft)}s`, x + pw * 0.5, y + chipH * 0.5);
      ctx.globalAlpha = 1;
    }
    // rush window drains as a thin bar along the chip's bottom edge
    if (rushLive) {
      const rf = clamp(rushLeft / o.rush.window, 0, 1);
      ctx.fillStyle = rdef.color;
      ctx.globalAlpha = 0.85;
      roundRect(x + 10, y + chipH - 7, Math.max(3, (pw - 20) * rf), 3, 1.5); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // next target preview
    ctx.fillStyle = 'rgba(150,160,200,0.6)';
    ctx.font = '600 9px system-ui, sans-serif';
    ctx.fillText('NEXT TARGET', x + pw - 40, y + 12);
    drawPuckAt(x + pw - 40, y + chipH / 2 + 9, 13, nextObjective.value, puckColor(nextObjective.value), 0.8);
    ctx.restore();
  }
  ctx.restore();
}

function drawEffects() {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles) {
    ctx.globalAlpha = clamp(p.life, 0, 1);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  for (const s of shockwaves) {
    const t = 1 - s.life;
    ctx.globalAlpha = s.life * 0.7;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 3 * s.life;
    ctx.beginPath();
    ctx.arc(s.x, s.y, lerp(s.r, s.maxR, t), 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const f of floaters) {
    ctx.globalAlpha = clamp(f.life, 0, 1);
    ctx.fillStyle = f.color;
    glow(f.color, 8);
    ctx.font = `800 ${f.size}px system-ui, sans-serif`;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.restore();
}

  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

    { v: 2, x: W * 0.22 + Math.sin(now / 1700) * 14, y: cy - 96 + Math.cos(now / 1400) * 10 },
    { v: 8, x: W * 0.78 + Math.sin(now / 1500 + 2) * 16, y: cy - 80 + Math.cos(now / 1800 + 1) * 12 },

  ctx.font = `800 ${Math.min(52, W * 0.13)}px system-ui, sans-serif`;

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#8b95c9';
  ctx.font = '600 15px system-ui, sans-serif';
  ctx.fillText('glide · collide · combine', W / 2, cy + 40);
  ctx.font = '500 14px system-ui, sans-serif';
  ctx.fillStyle = 'rgba(200,208,240,0.8)';
  const lines = [
    'Point where to shoot, or pull back like a cue.',
    'Slam equal pucks together to merge their sum.',
    'Build the TARGET number for points & ⏱ time.',
    'Beat ⚡ RUSH targets fast to win power-ups!'
  ];
  lines.forEach((l, i) => ctx.fillText(l, W / 2, cy + 88 + i * 24));
  // mode buttons
  const bw = Math.min(150, (W - 60) / 2), bh = 58, by = cy + 196;
  menuButtons = {
    timed: { x: W / 2 - bw - 8, y: by, w: bw, h: bh },
    zen:   { x: W / 2 + 8,      y: by, w: bw, h: bh }
  };
  const pulse = 0.75 + 0.25 * Math.sin(now / 350);
  const btns = [
    { r: menuButtons.timed, label: 'TIMED', sub: '90s · beat the clock', color: '#22d3ee' },
    { r: menuButtons.zen,   label: 'ZEN',   sub: 'no timer · no score',  color: '#a78bfa' }
  ];
  for (const b of btns) {
    ctx.fillStyle = 'rgba(16,20,44,0.9)';
    roundRect(b.r.x, b.r.y, b.r.w, b.r.h, 14); ctx.fill();
    ctx.strokeStyle = b.color;
    ctx.globalAlpha = pulse;
    glow(b.color, 12);
    ctx.lineWidth = 1.8;
    roundRect(b.r.x, b.r.y, b.r.w, b.r.h, 14); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.fillStyle = b.color;
    ctx.font = '800 20px system-ui, sans-serif';
    ctx.fillText(b.label, b.r.x + b.r.w / 2, b.r.y + 24);
    ctx.fillStyle = 'rgba(200,208,240,0.7)';
    ctx.font = '600 11px system-ui, sans-serif';
    ctx.fillText(b.sub, b.r.x + b.r.w / 2, b.r.y + 43);
  }
  if (best > 0) {
    ctx.fillStyle = '#8b95c9';
    ctx.font = '600 14px system-ui, sans-serif';
    ctx.fillText('BEST  ' + best.toLocaleString(), W / 2, by + bh + 34);
  }
  // sound toggle
  const sw = 148, sh = 36, sy = by + bh + (best > 0 ? 56 : 26);
  menuSoundRect = { x: W / 2 - sw / 2, y: sy, w: sw, h: sh };
  ctx.fillStyle = 'rgba(16,20,44,0.9)';
  roundRect(menuSoundRect.x, sy, sw, sh, 10); ctx.fill();
  ctx.strokeStyle = soundOn ? 'rgba(139,149,201,0.55)' : 'rgba(139,149,201,0.3)';
  ctx.lineWidth = 1.4;
  roundRect(menuSoundRect.x, sy, sw, sh, 10); ctx.stroke();
  ctx.fillStyle = soundOn ? '#8b95c9' : 'rgba(139,149,201,0.55)';
  ctx.font = '700 13px system-ui, sans-serif';
  ctx.fillText(soundOn ? '🔊 SOUND ON' : '🔇 SOUND OFF', W / 2, sy + sh / 2);
  // graphics quality toggle
  const gy = sy + sh + 12;
  menuGfxRect = { x: W / 2 - sw / 2, y: gy, w: sw, h: sh };
  ctx.fillStyle = 'rgba(16,20,44,0.9)';
  roundRect(menuGfxRect.x, gy, sw, sh, 10); ctx.fill();
  ctx.strokeStyle = 'rgba(139,149,201,0.55)';
  ctx.lineWidth = 1.4;
  roundRect(menuGfxRect.x, gy, sw, sh, 10); ctx.stroke();
  ctx.fillStyle = '#8b95c9';
  ctx.font = '700 13px system-ui, sans-serif';
  ctx.fillText(lowGfx ? '⚡ GRAPHICS: LOW' : '✨ GRAPHICS: FULL', W / 2, gy + sh / 2);
  ctx.restore();
}

function drawGameOver(now) {
  const t = clamp((now - overAt) / 500, 0, 1);
  ctx.save();
  ctx.fillStyle = `rgba(5,6,15,${0.78 * t})`;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = t;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const cy = H * 0.32;
  ctx.fillStyle = '#f87171';
  glow('#f87171', 20);
  ctx.font = '800 40px system-ui, sans-serif';
  ctx.fillText("TIME'S UP", W / 2, cy);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#e8ecff';
  glow('#22d3ee', 16);
  ctx.font = '800 54px system-ui, sans-serif';
  ctx.fillText(score.toLocaleString(), W / 2, cy + 74);
  ctx.shadowBlur = 0;
  if (score >= best && score > 0) {
    ctx.fillStyle = '#facc15';

  } else {
    ctx.fillStyle = '#8b95c9';

  }

  ctx.font = '500 15px system-ui, sans-serif';

  if (now - overAt > 700) {

    ctx.fillStyle = '#22d3ee';
    glow('#22d3ee', 14);
    ctx.font = '800 20px system-ui, sans-serif';
    ctx.fillText('TAP TO CONTINUE', W / 2, cy + 220);
  }
  ctx.restore();
}

function render(now) {
  ctx.save();
  if (shake.t > 0 && shake.mag > 0) {
    const m = shake.mag * clamp(shake.t / 0.25, 0, 1);
    ctx.translate(rnd(-m, m), rnd(-m, m));
  }
  drawBackground(now);
  drawBoardFrame();
  drawTargetWatermark();
  drawPucks();
  if (state === 'play') {
    drawLauncher(now);
    drawAimGuide();
    drawPowerupBanner(now);
  }
  drawEffects();
  if (state !== 'menu') drawHUD(now);
  // time-running-out glow: creeps in from 30s, breathes harder as time drains,
  // and snaps to a once-per-second pulse (synced with the ticks) in the last 5s
  if (state === 'play' && mode === 'timed' && timeLeft <= 30 && timeLeft > 0 && !hasPower('freeze')) {
    const u = clamp((30 - timeLeft) / 25, 0, 1); // 0 at 30s → 1 at 5s
    let a;
    if (timeLeft <= 5) {
      // bright at each second boundary, decaying within the second
      a = 0.12 + 0.3 * Math.pow(clamp(timeLeft % 1, 0, 1), 1.5);
    } else {
      const breathe = 0.5 + 0.5 * Math.sin(now / 260);
      a = 0.05 + 0.2 * u * breathe;
    }
    if (lowGfx) {
      ctx.fillStyle = `rgba(248,60,60,${a * 0.4})`;
      ctx.fillRect(0, 0, W, H);
    } else {
      const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.22, W / 2, H / 2, H * 0.75);
      vg.addColorStop(0, 'rgba(248,60,60,0)');
      vg.addColorStop(1, `rgba(248,60,60,${a})`);
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, W, H);
    }
    if (timeLeft <= 10) {
      // faint full-screen wash on top for the final stretch
      ctx.fillStyle = `rgba(248,40,40,${a * 0.3})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
  ctx.restore();
  if (state === 'menu') drawMenu(now);
  if (state === 'paused') drawPaused(now);
  if (state === 'over') drawGameOver(now);
}

function drawPaused(now) {
  ctx.save();
  ctx.fillStyle = 'rgba(5,6,15,0.78)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const cy = H * 0.3;
  ctx.fillStyle = '#22d3ee';
  glow('#22d3ee', 18);
  ctx.font = '800 38px system-ui, sans-serif';
  ctx.fillText('PAUSED', W / 2, cy);
  ctx.shadowBlur = 0;
  const bw = Math.min(230, W - 120), bh = 52, bx = W / 2 - bw / 2;
  pausedButtons = {
    resume: { x: bx, y: cy + 60, w: bw, h: bh },
    sound:  { x: bx, y: cy + 128, w: bw, h: bh },
    gfx:    { x: bx, y: cy + 196, w: bw, h: bh },
    exit:   { x: bx, y: cy + 264, w: bw, h: bh }
  };
  const btns = [
    { r: pausedButtons.resume, label: 'RESUME', color: '#22d3ee', glow: true },
    { r: pausedButtons.sound, label: soundOn ? '🔊 SOUND ON' : '🔇 SOUND OFF', color: '#a78bfa' },
    { r: pausedButtons.gfx, label: lowGfx ? '⚡ GRAPHICS: LOW' : '✨ GRAPHICS: FULL', color: '#a78bfa' },
    { r: pausedButtons.exit, label: 'EXIT TO MENU', color: '#8b95c9' }
  ];
  for (const b of btns) {
    ctx.fillStyle = 'rgba(16,20,44,0.92)';
    roundRect(b.r.x, b.r.y, b.r.w, b.r.h, 14); ctx.fill();
    ctx.strokeStyle = b.color;
    ctx.globalAlpha = b.glow ? 0.75 + 0.25 * Math.sin(now / 350) : 0.55;
    if (b.glow) glow(b.color, 12);
    ctx.lineWidth = 1.8;
    roundRect(b.r.x, b.r.y, b.r.w, b.r.h, 14); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.fillStyle = b.color;
    ctx.font = '800 17px system-ui, sans-serif';
    ctx.fillText(b.label, b.r.x + b.r.w / 2, b.r.y + b.r.h / 2 + 1);
  }
  ctx.restore();
}

// debug/testing hooks (harmless in production)
window.__dbg = {
  start: startGame,
  startZen() { mode = 'zen'; startGame(); },
  end: endGame,
  menu() { state = 'menu'; },
  shoot(offAngle, power, value) {
    const ang = -Math.PI / 2 + (offAngle || 0);
    const p = clamp(power || 12, MIN_POWER, MAX_POWER);
    createPuck(launcherX, launcherY, value || currentValue, Math.cos(ang) * p, Math.sin(ang) * p);
    sfx.launch(p);
    currentValue = nextValue; nextValue = randLaunchValue();
  },
  spawn(x, y, v, vx, vy) { return createPuck(x, y, v, vx, vy); },
  clear() { for (const p of [...pucks]) removePuck(p); },
  roll: randLaunchValue,
  step(ticks) { for (let i = 0; i < (ticks || 1); i++) stepPhysics(); },
  power(type) { activatePowerup(type || 'rapid', W / 2, H / 2); },
  get state() { return { state, mode, score, timeLeft, pucks: pucks.map(p => ({ v: p.value, x: p.body.position.x | 0, y: p.body.position.y | 0 })), objective: objective && { v: objective.value, pts: objective.points, time: objective.time, rush: objective.rush && { type: objective.rush.type, missed: objective.rush.missed, window: objective.rush.window, left: +((objective.rush.deadline - simTime) / 1000).toFixed(1) } }, next: nextObjective && { v: nextObjective.value }, objectivesCompleted, powerups: powers.map(p => ({ type: p.type, left: +((p.until - simTime) / 1000).toFixed(1) })) }; },
  set time(t) { timeLeft = t; },
  get lowGfx() { return lowGfx; },
  set lowGfx(on) { setLowGfx(!!on); }
};

resize();
requestAnimationFrame(frame);
</script>
